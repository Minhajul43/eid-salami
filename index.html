<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salami Calculation | ঈদ স্পেশাল 🌙</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Pacifico&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

  <div class="app-container">
    <!-- UI 1: ইনপুট স্ক্রিন -->
    <div id="ui-input" class="card fade-in">
      <div class="header">
        <h1>🌙 ঈদ সালামি</h1>
        <p>ফরমটি পূরণ করে আপনার সালামি বুঝে নিন!</p>
      </div>

      <form id="salamiForm">
        <div class="input-box">
          <label>আপনার নাম</label>
          <input type="text" id="userName" placeholder="এখানে নাম লিখুন" required>
        </div>

        <div class="input-box">
          <label>বিকাশ নাম্বার</label>
          <input type="number" id="bkash" placeholder="017XXXXXXXX" required>
        </div>

        <div class="row">
          <div class="input-box">
            <label>বয়স</label>
            <input type="number" id="age" placeholder="বয়স" required>
          </div>
          <div class="input-box">
            <label>রেজাল্ট (CGPA<=4)</label>
            <input type="number" step="0.01" id="result" placeholder="যেমন: ৩.৯০" required>
          </div>
        </div>

        <div class="input-box">
          <label>সালামি কেন দেব? (বিস্তারিত)</label>
          <textarea id="reason" rows="3" placeholder="মন জয় করার মতো কিছু লিখুন..."></textarea>
        </div>

        <button type="submit" class="btn-calculate">সালামি ক্যালকুলেট করুন 💸</button>
      </form>
    </div>

    <!-- UI 2: রেজাল্ট স্ক্রিন -->
    <div id="ui-result" class="card hidden">
      <div class="gift-icon">🎁</div>
      <h2 id="displayGreeting"></h2>

      <div class="salami-display">
        <span class="currency">৳</span>
        <span id="salamiAmount">0</span>
      </div>

      <div class="message-box">
        <p id="happyMessage"></p>
      </div>

      <div class="bkash-badge">
        সালামি পাঠানো হবে এই নাম্বারে: <span id="displayBkash"></span>
      </div>

      <button onclick="window.location.reload()" class="btn-back">আবার চেষ্টা করুন</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
